# S10 — automated dependency updates. Dependabot opens PRs for npm + GitHub
# Actions bumps; CI (ci.yml) gates each one on typecheck/lint/test/build/audit.
# This is how we pick up a patched Next (bundling postcss >= 8.5.10) without
# downgrading Next by hand.
version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      # Daily, not weekly (2026-07-22). On a weekly cadence a fresh HIGH advisory
      # can sit for up to 7 days failing the `audit` job on every unrelated push
      # — which is exactly what happened twice running: the eslint-chain
      # advisories (20595b4) and sharp/libvips (a3aff34) both surfaced as "CI is
      # red again" on commits that had nothing to do with them.
      #
      # This narrows the window; it does not close it. Dependabot **security**
      # updates (repo Settings → Code security) are the same-day reaction, and
      # neither helps when the fix is an override rather than a version bump —
      # sharp was pinned transitively by next, so no dependency PR could have
      # fixed it. See the "overrides" block in package.json.
      interval: daily
    open-pull-requests-limit: 10
    groups:
      # Batch low-risk minor/patch bumps into one PR to cut noise; majors stay
      # individual so breaking changes get reviewed on their own.
      minor-and-patch:
        update-types: ["minor", "patch"]
    ignore:
      # Major bumps CI red-flagged as toolchain-incompatible — pin to the current
      # major so Dependabot stops re-proposing them. Minor/patch within the major
      # still flow. Remove an entry to revisit once the ecosystem catches up.
      # - ESLint 10 needs eslint-config-next (peer-deps on ESLint 9) to support it.
      # - TypeScript 7 is the new native compiler; too early for next/eslint/vitest.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
